      height: 100vh;
      text-align: center;
    }

    .box {
      background: white;

    }

    h1 {
      color: #ff4d88;

    }

    p {

      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      background: #ff4d88;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;

    }

    a:hover {
      background: #e6005c;
    }

</head>
<body>

  <div class="box">
